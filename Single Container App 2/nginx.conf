server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Main app
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check endpoint — required by ECS and EKS load balancers
    location /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'OK';
    }

    # Gzip
    gzip on;
    gzip_types text/html text/css application/javascript;
}
