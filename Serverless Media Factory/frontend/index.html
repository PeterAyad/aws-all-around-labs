<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Serverless Media Factory</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #0d0f14;
      --surface:   #151820;
      --border:    #252a35;
      --accent:    #e8ff47;
      --accent2:   #47c8ff;
      --text:      #e2e8f0;
      --muted:     #6b7280;
      --radius:    6px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      padding: 2rem;
    }

    header {
      display: flex;
      align-items: baseline;
      gap: 1.2rem;
      margin-bottom: 2.5rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1.2rem;
    }
    header h1 {
      font-family: 'Space Mono', monospace;
      font-size: 1.3rem;
      color: var(--accent);
      letter-spacing: -0.02em;
    }
    header span {
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ── Upload zone ─────────────────────────────────────────────────── */
    .upload-zone {
      border: 1.5px dashed var(--border);
      border-radius: var(--radius);
      padding: 2.5rem;
      text-align: center;
      transition: border-color 0.2s, background 0.2s;
      cursor: pointer;
      margin-bottom: 2rem;
      position: relative;
    }
    .upload-zone:hover,
    .upload-zone.drag  { border-color: var(--accent); background: rgba(232,255,71,.04); }
    .upload-zone input { position:absolute; inset:0; opacity:0; cursor:pointer; }

    .upload-zone .icon {
      font-size: 2.2rem;
      margin-bottom: .6rem;
      display: block;
    }
    .upload-zone p   { color: var(--muted); font-size: .88rem; }
    .upload-zone strong { color: var(--accent); font-family: 'Space Mono', monospace; font-size: .82rem; }

    /* ── Upload button ───────────────────────────────────────────────── */
    #upload-btn {
      display: none;
      background: var(--accent);
      color: #0d0f14;
      border: none;
      padding: .65rem 1.8rem;
      font-family: 'Space Mono', monospace;
      font-size: .82rem;
      border-radius: var(--radius);
      cursor: pointer;
      margin-bottom: 2rem;
      transition: opacity .15s;
    }
    #upload-btn:disabled { opacity: .45; cursor: default; }
    #upload-btn:hover:not(:disabled) { opacity: .85; }

    /* ── Status bar ──────────────────────────────────────────────────── */
    #status {
      font-family: 'Space Mono', monospace;
      font-size: .78rem;
      color: var(--accent2);
      min-height: 1.4rem;
      margin-bottom: 2rem;
    }

    /* ── Results grid ────────────────────────────────────────────────── */
    .section-label {
      font-family: 'Space Mono', monospace;
      font-size: .7rem;
      color: var(--muted);
      letter-spacing: .1em;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    #results {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      opacity: 0;
      transform: translateY(10px);
      animation: fadeUp .35s ease forwards;
    }
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
    .card img {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      display: block;
    }
    .card-meta {
      padding: .6rem .8rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .card-meta .label {
      font-family: 'Space Mono', monospace;
      font-size: .72rem;
      color: var(--accent);
    }
    .card-meta .tag {
      font-size: .68rem;
      color: var(--muted);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: .15rem .4rem;
    }
    .card-meta .tag.original { color: var(--accent2); border-color: var(--accent2); }

    /* ── Spinner ─────────────────────────────────────────────────────── */
    .spinner {
      display: inline-block;
      width: 10px; height: 10px;
      border: 2px solid var(--accent2);
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      margin-right: .4rem;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <header>
    <h1>⬡ Media Factory</h1>
    <span>EventBridge + Step Functions + Lambda</span>
  </header>

  <div class="upload-zone" id="drop-zone">
    <input type="file" id="file-input" accept="image/jpeg,image/png,image/webp" />
    <span class="icon">📷</span>
    <p>Drop an image here, or <strong>click to browse</strong></p>
    <p style="margin-top:.4rem; font-size:.78rem;" id="chosen-name"></p>
  </div>

  <button id="upload-btn">Upload &amp; Process</button>

  <div id="status"></div>

  <div class="section-label" id="results-label" style="display:none">Processed outputs</div>
  <div id="results"></div>

  <script src="script.js"></script>
</body>
</html>
